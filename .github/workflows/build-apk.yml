name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Generate native project
        run: npx expo prebuild --platform android --clean

      - name: Enable JS bundling in debug build
        run: |
          # Patch generated build.gradle to embed JS bundle in debug APK
          cd android/app
          if grep -q 'react {' build.gradle; then
            sed -i '/react {/a\    bundleInDebug = true' build.gradle
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=${GITHUB_SHA::7}
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/wtt-${VERSION}-${SHORT_SHA}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtt-apk-debug
          path: android/app/build/outputs/apk/debug/wtt-*.apk
          retention-days: 30

  release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=${GITHUB_SHA::7}
          APK_SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_SRC" "android/app/build/outputs/apk/release/wtt-${VERSION}-${SHORT_SHA}-release.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: wtt-apk-release
          path: android/app/build/outputs/apk/release/wtt-*-release.apk
          retention-days: 90
